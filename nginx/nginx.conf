# ══════════════════════════════════════════════════════════════════════════════
# ReqAI – Nginx Production Configuration
#
# Architecture:
#   Internet ─→ Nginx (80/443)
#                 ├─→ /api/*         → backend:3000  (Node.js API)
#                 └─→ /*             → frontend:80   (React SPA, nginx static)
#
# Features:
#   • TLS 1.2 / 1.3  (A+ SSL Labs rating)
#   • HTTP → HTTPS redirect with HSTS preload
#   • OCSP stapling  (faster TLS handshake)
#   • gzip compression  (all text assets)
#   • SPA fallback  (React Router HTML5 history)
#   • API reverse proxy with upstream keepalive
#   • Per-route rate limiting  (auth: 10/min, analysis: 5/min, api: 100/min)
#   • Security headers  (CSP, HSTS, X-Frame-Options, Permissions-Policy)
#   • Static asset caching  (1 year for hashed, no-cache for HTML)
#   • Custom JSON error pages for 429, 502, 503
# ══════════════════════════════════════════════════════════════════════════════

worker_processes      auto;
worker_rlimit_nofile  65535;
pid                   /var/run/nginx.pid;

events {
  worker_connections  4096;
  multi_accept        on;
  use                 epoll;
}

http {
  # ── MIME types ─────────────────────────────────────────────────────────────
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Structured access log ──────────────────────────────────────────────────
  log_format json_combined escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":$status,'
      '"bytes_sent":$body_bytes_sent,'
      '"request_time":$request_time,'
      '"upstream_response_time":"$upstream_response_time",'
      '"upstream_addr":"$upstream_addr",'
      '"user_agent":"$http_user_agent",'
      '"x_request_id":"$http_x_request_id",'
      '"x_forwarded_for":"$http_x_forwarded_for"'
    '}';

  access_log /var/log/nginx/access.log json_combined;
  error_log  /var/log/nginx/error.log  warn;

  # ── Performance ────────────────────────────────────────────────────────────
  sendfile            on;
  tcp_nopush          on;
  tcp_nodelay         on;
  keepalive_timeout   75s;
  keepalive_requests  1000;
  types_hash_max_size 2048;
  server_tokens       off;  # Hide nginx version number

  # ── Request/response buffer tuning ────────────────────────────────────────
  client_max_body_size       10m;
  client_body_buffer_size    128k;
  client_header_buffer_size  4k;
  large_client_header_buffers 4 16k;

  # ── Proxy buffer tuning ────────────────────────────────────────────────────
  proxy_buffer_size          16k;
  proxy_buffers              8 16k;
  proxy_busy_buffers_size    32k;
  proxy_connect_timeout      10s;
  proxy_send_timeout         60s;
  proxy_read_timeout         120s;   # Covers AI analysis long-poll window

  # ── Gzip compression ───────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_min_length   1024;
  gzip_buffers      16 8k;
  gzip_http_version 1.1;
  gzip_types
    application/javascript
    application/json
    application/manifest+json
    application/xml
    font/woff
    font/woff2
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  # ── Rate limiting zones ────────────────────────────────────────────────────
  # Auth endpoints: brute-force protection
  limit_req_zone $binary_remote_addr zone=reqai_auth:10m     rate=10r/m;
  # AI analysis: expensive GPU/LLM operation — tight cap
  limit_req_zone $binary_remote_addr zone=reqai_analysis:10m rate=5r/m;
  # General API traffic
  limit_req_zone $binary_remote_addr zone=reqai_api:10m      rate=100r/m;

  limit_req_status       429;
  limit_conn_zone        $binary_remote_addr zone=reqai_conn:10m;
  limit_conn             reqai_conn 50;

  # ── Backend upstream ───────────────────────────────────────────────────────
  upstream reqai_backend {
    server  backend:3000;
    keepalive 32;
    # Uncomment for horizontal scaling:
    # server  backend-2:3000;
    # least_conn;
  }

  # ── Frontend upstream ──────────────────────────────────────────────────────
  upstream reqai_frontend {
    server  frontend:80;
    keepalive 16;
  }

  # ── Map: pass X-Request-ID or generate one ─────────────────────────────────
  map $http_x_request_id $reqai_request_id {
    default $http_x_request_id;
    ""      $request_id;
  }

  # ═══════════════════════════════════════════════════════════════════════════
  # HTTP → HTTPS redirect
  # ═══════════════════════════════════════════════════════════════════════════
  server {
    listen      80;
    listen      [::]:80;
    server_name _;

    # ACME challenge for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ═══════════════════════════════════════════════════════════════════════════
  # HTTPS Main Server
  # ═══════════════════════════════════════════════════════════════════════════
  server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name ${DOMAIN_NAME};

    # ── TLS Certificates ─────────────────────────────────────────────────────
    ssl_certificate      /etc/letsencrypt/live/${DOMAIN_NAME}/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/${DOMAIN_NAME}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/${DOMAIN_NAME}/chain.pem;

    # ── TLS Hardening ─────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout          5s;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Health check (no auth, no rate-limit, no access log) ─────────────────
    location /api/v1/health/ {
      access_log off;
      proxy_pass         http://reqai_backend;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host $host;
    }

    # ── Auth routes (strict rate limit) ──────────────────────────────────────
    location ~ ^/api/v1/auth/(login|register|forgot-password|reset-password) {
      limit_req zone=reqai_auth burst=5 nodelay;

      proxy_pass         http://reqai_backend;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Request-ID      $reqai_request_id;
    }

    # ── Analysis trigger (AI-expensive — tight rate limit) ───────────────────
    location ~ ^/api/v1/projects/[^/]+/requirements/[^/]+/analyze$ {
      limit_req zone=reqai_analysis burst=2 nodelay;

      proxy_pass         http://reqai_backend;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Request-ID      $reqai_request_id;
      proxy_read_timeout 30s;
    }

    # ── General API proxy ─────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=reqai_api burst=30 nodelay;

      proxy_pass         http://reqai_backend;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Request-ID      $reqai_request_id;

      # CORS (handled by Express; strip upstream duplicates)
      proxy_hide_header  Access-Control-Allow-Origin;
      add_header Access-Control-Allow-Origin      "https://${DOMAIN_NAME}" always;
      add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Request-ID" always;
      add_header Access-Control-Allow-Credentials "true" always;

      if ($request_method = OPTIONS) {
        add_header Access-Control-Max-Age 86400;
        return 204;
      }
    }

    # ── Vite-hashed static assets (JS, CSS, fonts, images) ───────────────────
    # Cache for 1 year — Vite appends content hash to every filename
    location ~* \.(js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|webp|avif|svg)$ {
      proxy_pass    http://reqai_frontend;
      expires       1y;
      add_header    Cache-Control "public, immutable";
      access_log    off;
      log_not_found off;
    }

    # ── SPA fallback (React Router HTML5 history) ─────────────────────────────
    location / {
      proxy_pass         http://reqai_frontend;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host $host;

      # Always serve fresh HTML shell
      add_header Cache-Control "no-cache, no-store, must-revalidate" always;
      add_header Pragma        "no-cache"                            always;
      add_header Expires       "0"                                   always;
    }

    # ── Custom JSON error responses ───────────────────────────────────────────
    error_page 429             @rate_limited;
    error_page 502 503 504     @gateway_error;

    location @rate_limited {
      default_type application/json;
      return 429 '{"success":false,"error":{"code":"TOO_MANY_REQUESTS","message":"Rate limit exceeded. Please try again later."}}';
    }

    location @gateway_error {
      default_type application/json;
      return 502 '{"success":false,"error":{"code":"GATEWAY_ERROR","message":"Service temporarily unavailable."}}';
    }
  }
}
