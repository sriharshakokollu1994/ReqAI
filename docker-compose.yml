# ══════════════════════════════════════════════════════════════════════════════
# ReqAI – Docker Compose (Development)
#
# Usage:
#   docker compose up           # start all services
#   docker compose up backend   # start only backend + its dependencies
#   docker compose logs -f      # tail all logs
#   docker compose down -v      # stop and remove volumes
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: reqai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       reqai
      POSTGRES_USER:     reqai
      POSTGRES_PASSWORD: reqai_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-run all migration SQL files in order on first start
      - ./backend/src/infrastructure/database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U reqai -d reqai"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 15s

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: reqai-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Backend API (hot-reload) ─────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     development
    container_name: reqai-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV:     development
      DATABASE_URL: postgresql://reqai:reqai_password@postgres:5432/reqai
      REDIS_URL:    redis://redis:6379
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"
    volumes:
      # Mount source for hot-reload (read-only to prevent accidental writes)
      - ./backend/src:/app/src:ro
      - ./backend/tsconfig.json:/app/tsconfig.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:     ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health/live"]
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 20s

  # ── Frontend (Vite HMR) ──────────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      target:     development
    container_name: reqai-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
