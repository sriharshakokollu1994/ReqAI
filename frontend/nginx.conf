# ══════════════════════════════════════════════════════════════════════════════
# ReqAI – Frontend Nginx (Sidecar / Standalone Mode)
#
# Used in production when the frontend container serves static files directly.
# Nginx in the frontend container does NOT handle TLS — that is the edge
# nginx container's (reqai-nginx-prod) job.
#
# Responsibilities:
#   • Serve Vite-built SPA static assets
#   • SPA fallback: unknown paths → index.html (React Router)
#   • Cache hashed assets for 1 year; no-cache for HTML
#   • Gzip compression
#   • Proxy /api/* → backend:3000 (used in dev; edge nginx handles it in prod)
# ══════════════════════════════════════════════════════════════════════════════

server {
  listen      80;
  listen      [::]:80;
  server_name _;

  root  /usr/share/nginx/html;
  index index.html;

  # Suppress nginx version from Server header
  server_tokens off;

  # ── Gzip ─────────────────────────────────────────────────────────────────
  gzip            on;
  gzip_vary       on;
  gzip_proxied    any;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    application/javascript
    application/json
    application/manifest+json
    font/woff
    font/woff2
    image/svg+xml
    text/css
    text/javascript
    text/plain;

  # ── Vite-hashed static assets (immutable 1-year cache) ───────────────────
  location ~* \.(js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|webp|avif|svg)$ {
    expires       1y;
    add_header    Cache-Control "public, immutable";
    access_log    off;
    log_not_found off;
    try_files     $uri =404;
  }

  # ── API proxy (development / standalone mode only) ────────────────────────
  # In production the edge nginx handles /api/* → backend:3000 directly.
  location /api/ {
    proxy_pass         http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_cache_bypass $http_upgrade;
  }

  # ── SPA fallback ──────────────────────────────────────────────────────────
  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma        "no-cache"                            always;
    add_header Expires       "0"                                   always;
    try_files  $uri $uri/ /index.html;
  }

  # ── Health check (used by Docker HEALTHCHECK instruction) ────────────────
  location /health {
    access_log off;
    return 200 '{"status":"ok"}';
    add_header Content-Type application/json;
  }
}
